version: '3.8'

services:
  # Contenedor de la Aplicación Node.js
  app:
    build: .
    container_name: mototaxis_app
    ports:
      - "3000:3000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - PORT=3000
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root_password
      - DB_NAME=mototaxis_db
      - JWT_SECRET=clave_secreta_para_los_tokens_de_mototaxis
    depends_on:
      - db

  # Contenedor de la Base de Datos MySQL
  db:
    image: mysql:8.0
    container_name: mototaxis_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: mototaxis_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: